<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriptorium</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TITLEBAR ── -->
<div class="titlebar">
  <div class="titlebar-dots">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
  </div>
  <span class="titlebar-title">Scriptorium</span>
  <div class="titlebar-right">
    <div class="title-resource">
      <span class="tr-label">Đ</span>
      <span class="tr-val dn" id="js-gold">5</span>
    </div>
    <div class="title-resource">
      <span class="tr-label">⬡</span>
      <span class="tr-val salt" id="js-salt">0 g</span>
    </div>
    <button class="info-btn" id="js-info-btn">i</button>
    <div class="info-panel" id="js-info-panel">
      <div class="info-row">
        <span class="info-lbl">Title</span>
        <span class="info-val" id="js-scribe-title">Novice Scribe</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Đ Denarii</span>
        <span class="info-val dn" id="js-info-gold">5</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">⬡ Salt</span>
        <span class="info-val salt" id="js-info-salt">0 g</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Codices</span>
        <span class="info-val" id="js-codex-count">0</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Letters/s</span>
        <span class="info-val" id="js-auto-rate">0</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Per keystroke</span>
        <span class="info-val" id="js-info-click">1</span>
      </div>
      <div class="info-row">
        <span class="info-lbl">Salt bonus</span>
        <span class="info-val salt" id="js-info-bonus">+0%</span>
      </div>
    </div>
  </div>
</div>

<!-- ── APP BODY ── -->
<div class="app-body">

  <!-- FOLIO AREA -->
  <div class="folio-area">

    <div class="progress-block">
      <div class="prog-row">
        <span class="prog-lbl">Page</span>
        <div class="prog-track"><div class="prog-fill page" id="js-prog-page"></div></div>
        <span class="prog-stat" id="js-prog-page-stat">0 / 1,200</span>
      </div>
      <div class="prog-row">
        <span class="prog-lbl">Codex</span>
        <div class="prog-track"><div class="prog-fill codex" id="js-prog-codex"></div></div>
        <span class="prog-stat" id="js-prog-codex-stat">p. 1 / 300</span>
      </div>
    </div>

    <!-- folio SVG — 7:10 real codex proportion -->
    <div class="folio-wrap">
      <svg id="js-folio" viewBox="0 0 210 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="folio-clip">
            <rect x="0" y="0" width="210" height="300"/>
          </clipPath>
        </defs>
        <!-- depth/shadow page -->
        <rect x="3" y="3" width="206" height="296" fill="#ddd0a0" stroke="#9a8060" stroke-width="0.7"/>
        <!-- main folio -->
        <rect x="0" y="0" width="206" height="296" fill="#f0e6c8" stroke="#3d3018" stroke-width="1"/>
        <!-- top margin rule -->
        <line x1="10" y1="20" x2="196" y2="20" stroke="rgba(61,48,24,0.12)" stroke-width="0.6"/>
        <!-- bottom margin rule -->
        <line x1="10" y1="280" x2="196" y2="280" stroke="rgba(61,48,24,0.12)" stroke-width="0.6"/>
        <!-- left margin line — red ink -->
        <line x1="22" y1="10" x2="22" y2="288" stroke="rgba(139,58,26,0.28)" stroke-width="0.8"/>
        <!-- ruled lines -->
        <g clip-path="url(#folio-clip)">
          <line x1="22" y1="30"  x2="196" y2="30"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="40"  x2="196" y2="40"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="50"  x2="196" y2="50"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="60"  x2="196" y2="60"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="70"  x2="196" y2="70"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="80"  x2="196" y2="80"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="90"  x2="196" y2="90"  stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="100" x2="196" y2="100" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="110" x2="196" y2="110" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="120" x2="196" y2="120" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="130" x2="196" y2="130" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="140" x2="196" y2="140" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="150" x2="196" y2="150" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="160" x2="196" y2="160" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="170" x2="196" y2="170" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="180" x2="196" y2="180" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="190" x2="196" y2="190" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="200" x2="196" y2="200" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="210" x2="196" y2="210" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="220" x2="196" y2="220" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="230" x2="196" y2="230" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="240" x2="196" y2="240" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="250" x2="196" y2="250" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="260" x2="196" y2="260" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="270" x2="196" y2="270" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
          <line x1="22" y1="278" x2="196" y2="278" stroke="rgba(61,48,24,0.07)" stroke-width="0.5"/>
        </g>
        <!-- illuminated capital — hidden until salt upgrade -->
        <rect id="js-cap-box" x="24" y="22" width="32" height="32"
          fill="rgba(248,238,210,0)" stroke="rgba(184,146,10,0)" stroke-width="0.8"/>
        <text id="js-cap-letter" x="40" y="50" text-anchor="middle"
          font-family="Uncial Antiqua, serif" font-size="34"
          fill="rgba(139,58,26,0)" opacity="0">V</text>
        <!-- text layer -->
        <g id="js-folio-text" clip-path="url(#folio-clip)"></g>
      </svg>
    </div>

    <div class="key-hint">
      press <kbd>a</kbd> – <kbd>z</kbd> to write · scribes rest while auto-copyists work
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-tabs">
      <button class="stab active" id="stab-dn"   data-tab="dn">Đ Denarii</button>
      <button class="stab salt"   id="stab-salt" data-tab="salt">⬡ Salt</button>
    </div>

    <div class="sidebar-panel active" id="panel-dn">
      <div class="upgrades-list" id="list-dn"></div>
    </div>

    <div class="sidebar-panel" id="panel-salt">
      <div class="upgrades-list" id="list-salt"></div>
    </div>

    <div class="sidebar-footer">
      <button class="codex-btn" id="js-codex-btn" disabled>Bind the Codex</button>
      <div class="codex-note" id="js-codex-note">complete 300 pages to bind</div>
    </div>

  </div>
</div>

<div class="key-flash" id="js-flash"></div>
<div class="toast"     id="js-toast"></div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/upgrades.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
